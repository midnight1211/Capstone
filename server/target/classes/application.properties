# ============================================================
# Math Engine Server — application.properties
# ============================================================

# ---- Server -------------------------------------------------
# Binds to all interfaces so phones on the same WiFi can reach it.
# Change to 127.0.0.1 to restrict to localhost only.
server.address=0.0.0.0
server.port=8080

# ---- SQLite -------------------------------------------------
# Database file is created automatically on first run.
# Path is relative to the working directory (project root).
mathengine.db.path=mathengine.db

# ---- JWT ----------------------------------------------------
# Change this secret before any real deployment.
# Must be at least 256 bits (32 characters) for HS256.
mathengine.jwt.secret=MathEngine-ChangeThis-Secret-Key-Min32Chars!!
mathengine.jwt.expiry-hours=72

# ---- Native library -----------------------------------------
# Overridable via -Djava.library.path at launch.
# The build_and_run.ps1 script sets this automatically.
mathengine.native.lib.dir=src/main/cpp/build

# ---- CORS ---------------------------------------------------
# Allows the JavaFX desktop client (any origin) and same-origin
# browser requests. Tighten this before deploying publicly.
mathengine.cors.allowed-origins=*

# ---- Logging ------------------------------------------------
logging.level.com.mathengine=DEBUG
logging.level.org.springframework.security=WARN